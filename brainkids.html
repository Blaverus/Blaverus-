<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Brain Kids</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#e0f2fe,#fce7f3);color:#3b0764;text-align:center}
header{padding:24px;background:linear-gradient(135deg,#7c3aed,#ec4899,#38bdf8);color:white}
.box{max-width:980px;margin:18px auto;background:white;border-radius:24px;padding:18px;box-shadow:0 10px 25px #0002}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.card{background:#fce7f3;border-radius:18px;padding:14px}
button{padding:13px 18px;margin:6px;border:0;border-radius:999px;background:#ec4899;color:white;font-size:1rem;cursor:pointer}
.play{min-height:320px;font-size:1.3rem}
.big{font-size:3.2rem;margin:15px}
.choice{font-size:2rem;min-width:90px}
a{color:#7c3aed;font-weight:bold}
</style>
</head>
<body>

<header>
<h1>🧠 Blaverus Brain Kids</h1>
<p>Kluriga barnspel som tränar minne, färger, siffror och mönster</p>
</header>

<div class="box">
<h2>Välj klurspel</h2>
<div class="grid" id="menu"></div>
</div>

<div class="box">
<h2 id="title">Välj ett spel</h2>
<p id="info">Klicka på ett spel ovan.</p>
<p>Poäng: <span id="score">0</span> | Highscore: <span id="high">0</span></p>
<div class="play" id="play"></div>
<button onclick="restart()">Starta om</button>
</div>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const games=[
["count","🔢 Räkna katter","Räkna hur många katter du ser"],
["odd","👀 Hitta udda","Hitta bilden som inte passar"],
["pattern","🧩 Mönster","Vad kommer sen?"],
["memory","🧠 Minnesrad","Kom ihåg ordningen"],
["math","➕ Plus & minus","Enkel matte"],
["color","🎨 Färgfråga","Välj rätt färg"],
["shadow","🌑 Skuggan","Hitta rätt skugga"],
["order","🐾 Tassordning","Klicka i rätt ordning"],
["code","🔐 Skattkod","Öppna kistan med rätt kod"],
["shape","🔷 Former","Välj rätt form"]
];

let current=null,score=0,high=0,state={};
const menu=document.getElementById("menu");
const play=document.getElementById("play");

games.forEach(g=>{
 const div=document.createElement("div");
 div.className="card";
 div.innerHTML=`<h3>${g[1]}</h3><p>${g[2]}</p><button onclick="start('${g[0]}')">Spela</button>`;
 menu.appendChild(div);
});

function start(id){
 current=id;
 score=0;
 high=Number(localStorage.getItem("brainHigh_"+id))||0;
 state={};
 const g=games.find(x=>x[0]===id);
 document.getElementById("title").textContent=g[1];
 document.getElementById("info").textContent=g[2];
 update();
 next();
}
function restart(){ if(current)start(current); }
function update(){
 document.getElementById("score").textContent=score;
 document.getElementById("high").textContent=high;
}
function point(){
 score++;
 if(score>high){
   high=score;
   localStorage.setItem("brainHigh_"+current,high);
 }
 update();
 setTimeout(next,600);
}
function wrong(){
 play.innerHTML+="<p>Oj, testa igen 😊</p>";
}

function next(){
 if(current==="count") countGame();
 if(current==="odd") oddGame();
 if(current==="pattern") patternGame();
 if(current==="memory") memoryGame();
 if(current==="math") mathGame();
 if(current==="color") colorGame();
 if(current==="shadow") shadowGame();
 if(current==="order") orderGame();
 if(current==="code") codeGame();
 if(current==="shape") shapeGame();
}

/* 1 RÄKNA */
function countGame(){
 const n=2+Math.floor(Math.random()*7);
 play.innerHTML=`<h2>Hur många katter?</h2><div class="big">${"🐱".repeat(n)}</div>`;
 choices([n,n+1,Math.max(1,n-1)].sort(()=>Math.random()-.5),n);
}

/* 2 UDDA */
function oddGame(){
 const sets=[
  ["🐱","🐱","🐱","🐶"],
  ["⭐","⭐","🌙","⭐"],
  ["🍎","🍎","🍌","🍎"],
  ["🌸","🌸","🌼","🌸"]
 ];
 const s=sets[Math.floor(Math.random()*sets.length)].sort(()=>Math.random()-.5);
 const odd=s.find(x=>s.indexOf(x)===s.lastIndexOf(x));
 play.innerHTML="<h2>Vilken är udda?</h2>";
 s.forEach(x=>btn(x,()=>x===odd?point():wrong()));
}

/* 3 MÖNSTER */
function patternGame(){
 const patterns=[
  [["🐱","🐶","🐱","🐶"],"🐱"],
  [["⭐","🌙","⭐","🌙"],"⭐"],
  [["🔴","🔵","🔴","🔵"],"🔴"],
  [["🍎","🍌","🍎","🍌"],"🍎"]
 ];
 const p=patterns[Math.floor(Math.random()*patterns.length)];
 play.innerHTML=`<h2>Vad kommer sen?</h2><div class="big">${p[0].join(" ")}</div>`;
 choices(["🐱","🐶","⭐","🌙","🔴","🔵","🍎","🍌"].sort(()=>Math.random()-.5).slice(0,4).concat([p[1]]).sort(()=>Math.random()-.5),p[1]);
}

/* 4 MINNESRAD */
function memoryGame(){
 const opts=["🐱","⭐","🌈","💖"];
 const len=3+Math.min(4,score);
 const seq=[];
 for(let i=0;i<len;i++)seq.push(opts[Math.floor(Math.random()*opts.length)]);
 play.innerHTML=`<h2>Kom ihåg raden</h2><div class="big">${seq.join(" ")}</div>`;
 setTimeout(()=>{
   state.seq=seq;state.input=[];
   play.innerHTML="<h2>Klicka samma rad</h2>";
   opts.forEach(o=>btn(o,()=>memoryPress(o)));
 },1300+len*250);
}
function memoryPress(o){
 if(o!==state.seq[state.input.length]){
   wrong(); return;
 }
 state.input.push(o);
 if(state.input.length===state.seq.length)point();
}

/* 5 MATTE */
function mathGame(){
 let a=1+Math.floor(Math.random()*6);
 let b=1+Math.floor(Math.random()*5);
 let plus=Math.random()>.35;
 let ans=plus?a+b:Math.max(a,b)-Math.min(a,b);
 play.innerHTML=`<h2>Vad blir det?</h2><div class="big">${plus?`${a} + ${b}`:`${Math.max(a,b)} - ${Math.min(a,b)}`}</div>`;
 choices([ans,ans+1,Math.max(0,ans-1),ans+2].sort(()=>Math.random()-.5),ans);
}

/* 6 FÄRG */
function colorGame(){
 const colors=[
  ["Rosa","💖"],["Blå","🔵"],["Gul","⭐"],["Grön","🍀"],["Röd","🔴"],["Lila","💜"]
 ];
 const pick=colors[Math.floor(Math.random()*colors.length)];
 play.innerHTML=`<h2>Vilken betyder ${pick[0]}?</h2>`;
 colors.sort(()=>Math.random()-.5).slice(0,4).concat([pick]).sort(()=>Math.random()-.5).forEach(c=>btn(c[1],()=>c[0]===pick[0]?point():wrong()));
}

/* 7 SKUGGA */
function shadowGame(){
 const pick=["🐱","🐶","🐰","🦊"][Math.floor(Math.random()*4)];
 play.innerHTML=`<h2>Hitta samma bild som skuggan</h2><div class="big" style="filter:brightness(0)">${pick}</div>`;
 ["🐱","🐶","🐰","🦊"].sort(()=>Math.random()-.5).forEach(x=>btn(x,()=>x===pick?point():wrong()));
}

/* 8 ORDNING */
function orderGame(){
 const nums=[1,2,3,4,5].sort(()=>Math.random()-.5);
 state.next=1;
 play.innerHTML="<h2>Klicka 1 till 5 i ordning</h2>";
 nums.forEach(n=>btn("🐾 "+n,()=>{
   if(n===state.next){
     state.next++;
     if(state.next===6)point();
   }else wrong();
 }));
}

/* 9 KOD */
function codeGame(){
 const code=String(100+Math.floor(Math.random()*900));
 state.code=code;state.input="";
 play.innerHTML=`<h2>Kom ihåg koden</h2><div class="big">🔐 ${code}</div>`;
 setTimeout(()=>{
   play.innerHTML="<h2>Skriv koden</h2><p id='codeInput' class='big'></p>";
   [1,2,3,4,5,6,7,8,9,0].forEach(n=>btn(n,()=>codePress(n)));
 },1800);
}
function codePress(n){
 state.input+=n;
 document.getElementById("codeInput").textContent=state.input;
 if(state.input.length===3){
   if(state.input===state.code)point();
   else wrong();
 }
}

/* 10 FORMER */
function shapeGame(){
 const shapes=[["Cirkel","⚪"],["Fyrkant","⬜"],["Triangel","🔺"],["Stjärna","⭐"],["Hjärta","💖"]];
 const pick=shapes[Math.floor(Math.random()*shapes.length)];
 play.innerHTML=`<h2>Hitta formen: ${pick[0]}</h2>`;
 shapes.sort(()=>Math.random()-.5).forEach(s=>btn(s[1],()=>s[0]===pick[0]?point():wrong()));
}

function btn(text,fn){
 const b=document.createElement("button");
 b.className="choice";
 b.textContent=text;
 b.onclick=fn;
 play.appendChild(b);
}
function choices(arr,correct){
 arr=[...new Set(arr)].sort(()=>Math.random()-.5);
 play.innerHTML+=`<div></div>`;
 arr.forEach(x=>btn(x,()=>x===correct?point():wrong()));
}
</script>

</body>
</html>
