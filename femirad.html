<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Fem i Rad</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:white;text-align:center}
header{padding:22px;background:linear-gradient(135deg,#0066ff,#00aaff)}
.board{display:grid;grid-template-columns:repeat(15,32px);gap:3px;justify-content:center;margin:25px auto}
.cell{width:32px;height:32px;background:#161b22;border:1px solid #00aaff;border-radius:6px;color:white;font-size:18px;cursor:pointer}
button{padding:12px 20px;margin:10px;border:0;border-radius:10px;background:#0066ff;color:white;cursor:pointer}
a{color:#00aaff}
</style>
</head>
<body>

<header>
<h1>❌⭕ Fem i Rad</h1>
<p>Första spelaren som får fem i rad vinner</p>
</header>

<h2 id="status">X:s tur</h2>
<div class="board" id="board"></div>

<button onclick="restart()">Starta om</button>
<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const size = 15;
const boardEl = document.getElementById("board");
const statusText = document.getElementById("status");

let board = Array(size * size).fill("");
let currentPlayer = "X";
let gameActive = true;

function drawBoard(){
    boardEl.innerHTML = "";

    board.forEach((value, index) => {
        const cell = document.createElement("button");
        cell.className = "cell";
        cell.textContent = value;
        cell.onclick = () => makeMove(index);
        boardEl.appendChild(cell);
    });
}

function makeMove(index){
    if(board[index] !== "" || !gameActive) return;

    board[index] = currentPlayer;
    drawBoard();

    if(checkWin(index)){
        statusText.textContent = currentPlayer + " vann!";
        gameActive = false;
        return;
    }

    if(board.every(cell => cell !== "")){
        statusText.textContent = "Oavgjort!";
        gameActive = false;
        return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.textContent = currentPlayer + ":s tur";
}

function checkWin(index){
    const row = Math.floor(index / size);
    const col = index % size;

    const directions = [
        [0,1],
        [1,0],
        [1,1],
        [1,-1]
    ];

    for(const [dr,dc] of directions){
        let count = 1;

        count += countDirection(row, col, dr, dc);
        count += countDirection(row, col, -dr, -dc);

        if(count >= 5){
            return true;
        }
    }

    return false;
}

function countDirection(row, col, dr, dc){
    let count = 0;
    let r = row + dr;
    let c = col + dc;

    while(
        r >= 0 && r < size &&
        c >= 0 && c < size &&
        board[r * size + c] === currentPlayer
    ){
        count++;
        r += dr;
        c += dc;
    }

    return count;
}

function restart(){
    board = Array(size * size).fill("");
    currentPlayer = "X";
    gameActive = true;
    statusText.textContent = "X:s tur";
    drawBoard();
}

drawBoard();
</script>

</body>
</html>
