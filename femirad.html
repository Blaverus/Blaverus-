<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Fem i Rad</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d1117;
    color:white;
    text-align:center;
}
header{
    padding:22px;
    background:linear-gradient(135deg,#0066ff,#00aaff);
}
.wrap{
    max-width:900px;
    margin:auto;
    padding:20px;
}
.info{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin:15px 0;
}
.pill{
    background:#161b22;
    border:1px solid #30363d;
    padding:10px 16px;
    border-radius:999px;
}
.board-wrap{
    overflow:auto;
    padding:18px;
    background:#161b22;
    border-radius:18px;
    border:1px solid #30363d;
}
.board{
    display:grid;
    grid-template-columns:repeat(15,36px);
    grid-template-rows:repeat(15,36px);
    gap:0;
    width:max-content;
    margin:auto;
    background:#d6a85d;
    padding:18px;
    border-radius:12px;
    box-shadow:inset 0 0 0 4px #8b5e2a;
}
.cell{
    width:36px;
    height:36px;
    border:1px solid rgba(60,35,10,0.55);
    background:transparent;
    position:relative;
    cursor:pointer;
}
.cell:hover::after{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.35);
}
.stone{
    position:absolute;
    width:28px;
    height:28px;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 4px 8px rgba(0,0,0,0.45);
}
.blue .stone{
    background:radial-gradient(circle at 30% 30%,#93c5fd,#1d4ed8 65%,#0b2a7a);
}
.red .stone{
    background:radial-gradient(circle at 30% 30%,#fca5a5,#dc2626 65%,#7f1d1d);
}
.win .stone{
    outline:4px solid #22c55e;
    outline-offset:2px;
}
button.action{
    padding:12px 20px;
    margin:10px;
    border:0;
    border-radius:10px;
    background:#0066ff;
    color:white;
    font-size:1rem;
    cursor:pointer;
}
a{color:#00aaff}
</style>
</head>
<body>

<header>
<h1>🔵🔴 Fem i Rad</h1>
<p>Först med fem stenar i rad vinner</p>
</header>

<div class="wrap">

<div class="info">
    <div class="pill" id="status">Blå börjar</div>
    <div class="pill">Bräde: 15 × 15</div>
</div>

<div class="board-wrap">
    <div class="board" id="board"></div>
</div>

<button class="action" onclick="restart()">Starta om</button>
<p><a href="index.html">← Tillbaka till Blaverus</a></p>

</div>

<script>
const size = 15;
const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

let board = Array(size * size).fill("");
let currentPlayer = "blue";
let gameActive = true;
let winningCells = [];

function drawBoard(){
    boardEl.innerHTML = "";

    for(let i = 0; i < board.length; i++){
        const cell = document.createElement("button");
        cell.className = "cell";

        if(board[i]){
            cell.classList.add(board[i]);

            const stone = document.createElement("div");
            stone.className = "stone";
            cell.appendChild(stone);
        }

        if(winningCells.includes(i)){
            cell.classList.add("win");
        }

        cell.onclick = () => makeMove(i);
        boardEl.appendChild(cell);
    }
}

function makeMove(index){
    if(!gameActive || board[index] !== "") return;

    board[index] = currentPlayer;

    const win = checkWin(index);

    if(win){
        winningCells = win;
        gameActive = false;
        statusEl.textContent = currentPlayer === "blue" ? "Blå vann!" : "Röd vann!";
        drawBoard();
        return;
    }

    if(board.every(cell => cell !== "")){
        gameActive = false;
        statusEl.textContent = "Oavgjort!";
        drawBoard();
        return;
    }

    currentPlayer = currentPlayer === "blue" ? "red" : "blue";
    statusEl.textContent = currentPlayer === "blue" ? "Blås tur" : "Röds tur";

    drawBoard();
}

function checkWin(index){
    const row = Math.floor(index / size);
    const col = index % size;

    const directions = [
        [0,1],
        [1,0],
        [1,1],
        [1,-1]
    ];

    for(const [dr,dc] of directions){
        let line = [index];

        line = line
            .concat(countDirection(row, col, dr, dc))
            .concat(countDirection(row, col, -dr, -dc));

        if(line.length >= 5){
            return line.slice(0,5);
        }
    }

    return null;
}

function countDirection(row, col, dr, dc){
    const result = [];
    let r = row + dr;
    let c = col + dc;

    while(
        r >= 0 && r < size &&
        c >= 0 && c < size &&
        board[r * size + c] === currentPlayer
    ){
        result.push(r * size + c);
        r += dr;
        c += dc;
    }

    return result;
}

function restart(){
    board = Array(size * size).fill("");
    currentPlayer = "blue";
    gameActive = true;
    winningCells = [];
    statusEl.textContent = "Blå börjar";
    drawBoard();
}

drawBoard();
</script>

</body>
</html>
