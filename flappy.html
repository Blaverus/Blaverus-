<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Flappy Easy</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:white;text-align:center}
header{padding:20px;background:linear-gradient(135deg,#0066ff,#00aaff)}
canvas{background:#87ceeb;border:3px solid #0066ff;margin-top:15px;max-width:95%;touch-action:none}
button{padding:15px 30px;margin:10px;border:0;border-radius:10px;background:#0066ff;color:white;font-size:18px}
a{color:#00aaff}
</style>
</head>
<body>

<header>
<h1>🐦 Blaverus Flappy Easy</h1>
<p>Klicka eller tryck för att flyga</p>
</header>

<p>Poäng: <span id="score">0</span> | Highscore: <span id="highscore">0</span></p>

<canvas id="game" width="400" height="500"></canvas><br>
<button onclick="jump()">FLYG</button>
<button onclick="restart()">Starta om</button>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird, pipes, score, highscore, gameRunning;
highscore = localStorage.getItem("flappyHighscore") || 0;
document.getElementById("highscore").textContent = highscore;

function restart(){
    bird = {x:80, y:230, size:22, speed:0};
    pipes = [];
    score = 0;
    gameRunning = true;
    document.getElementById("score").textContent = score;
}

function jump(){
    bird.speed = -4.5;
}

canvas.addEventListener("click", jump);
document.addEventListener("keydown", e => {
    if(e.code === "Space") jump();
});

function addPipe(){
    let gap = 240;
    let top = Math.floor(Math.random() * 140) + 50;

    pipes.push({
        x:400,
        top:top,
        bottom:top + gap,
        width:60,
        counted:false
    });
}

function gameOver(){
    gameRunning = false;

    if(score > highscore){
        highscore = score;
        localStorage.setItem("flappyHighscore", highscore);
        document.getElementById("highscore").textContent = highscore;
    }

    alert("Game Over! Poäng: " + score);
    restart();
}

let pipeTimer = 0;

function loop(){
    ctx.clearRect(0,0,400,500);

    ctx.fillStyle = "#87ceeb";
    ctx.fillRect(0,0,400,500);

    ctx.fillStyle = "#22c55e";
    ctx.fillRect(0,455,400,45);

    if(gameRunning){
        bird.speed += 0.18;
        bird.y += bird.speed;

        pipeTimer++;

        if(pipeTimer > 190){
            addPipe();
            pipeTimer = 0;
        }

        pipes.forEach(pipe => {
            pipe.x -= 1.1;

            ctx.fillStyle = "#16a34a";
            ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
            ctx.fillRect(pipe.x,pipe.bottom,pipe.width,455-pipe.bottom);

            if(
                bird.x + bird.size > pipe.x &&
                bird.x - bird.size < pipe.x + pipe.width &&
                (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
            ){
                gameOver();
            }

            if(!pipe.counted && pipe.x + pipe.width < bird.x){
                pipe.counted = true;
                score++;
                document.getElementById("score").textContent = score;
            }
        });

        pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

        if(bird.y - bird.size < 0 || bird.y + bird.size > 455){
            gameOver();
        }
    }

    ctx.fillStyle = "#ffd43b";
    ctx.beginPath();
    ctx.arc(bird.x,bird.y,bird.size,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(bird.x+7,bird.y-7,4,0,Math.PI*2);
    ctx.fill();

    requestAnimationFrame(loop);
}

restart();
loop();
</script>

</body>
</html>
