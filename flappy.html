<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Flappy</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:white;text-align:center}
header{padding:25px;background:linear-gradient(135deg,#0066ff,#00aaff)}
canvas{background:#87ceeb;border:3px solid #0066ff;margin-top:20px;max-width:95%}
button{padding:14px 22px;margin:10px;border:0;border-radius:8px;background:#0066ff;color:white;font-size:1rem;cursor:pointer}
a{color:#00aaff}
</style>
</head>
<body>

<header>
<h1>🐦 Blaverus Flappy</h1>
<p>Klicka, tryck mellanslag eller använd knappen för att flyga!</p>
</header>

<p>Poäng: <span id="score">0</span></p>
<p>Highscore: <span id="highscore">0</span></p>

<canvas id="game" width="400" height="500"></canvas><br>
<button onclick="jump()">FLYG!</button>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {x:80, y:220, size:24, velocity:0};
let gravity = 0.45;
let jumpPower = -8;
let pipes = [];
let score = 0;
let highscore = localStorage.getItem("flappyHighscore") || 0;
let gameOver = false;

document.getElementById("highscore").textContent = highscore;

function jump(){
    if(gameOver){
        location.reload();
    }
    bird.velocity = jumpPower;
}

document.addEventListener("keydown", e => {
    if(e.code === "Space"){
        jump();
    }
});

canvas.addEventListener("click", jump);

function createPipe(){
    const gap = 140;
    const topHeight = Math.floor(Math.random() * 220) + 40;

    pipes.push({
        x:400,
        top:topHeight,
        bottom:topHeight + gap,
        width:60,
        passed:false
    });
}

function drawBird(){
    ctx.fillStyle = "#ffcc00";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(bird.x + 8, bird.y - 8, 4, 0, Math.PI * 2);
    ctx.fill();
}

function drawPipes(){
    ctx.fillStyle = "#00aa55";

    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, 500 - pipe.bottom);
    });
}

function endGame(){
    gameOver = true;

    if(score > highscore){
        highscore = score;
        localStorage.setItem("flappyHighscore", highscore);
    }

    alert("Game Over! Poäng: " + score);
    location.reload();
}

function loop(){
    ctx.clearRect(0,0,400,500);

    ctx.fillStyle = "#87ceeb";
    ctx.fillRect(0,0,400,500);

    bird.velocity += gravity;
    bird.y += bird.velocity;

    if(bird.y + bird.size > 500 || bird.y - bird.size < 0){
        endGame();
        return;
    }

    if(pipes.length === 0 || pipes[pipes.length - 1].x < 220){
        createPipe();
    }

    pipes.forEach(pipe => {
        pipe.x -= 3;

        if(
            bird.x + bird.size > pipe.x &&
            bird.x - bird.size < pipe.x + pipe.width &&
            (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
        ){
            endGame();
            return;
        }

        if(!pipe.passed && pipe.x + pipe.width < bird.x){
            pipe.passed = true;
            score++;
            document.getElementById("score").textContent = score;
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

    drawPipes();
    drawBird();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
