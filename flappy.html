<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Flappy</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:white;text-align:center}
header{padding:25px;background:linear-gradient(135deg,#0066ff,#00aaff)}
canvas{background:#7dd3fc;border:3px solid #0066ff;margin-top:15px;max-width:95%;touch-action:none}
button{padding:14px 24px;margin:10px;border:0;border-radius:10px;background:#0066ff;color:white;font-size:1rem;cursor:pointer}
a{color:#00aaff}
</style>
</head>
<body>

<header>
<h1>🐦 Blaverus Flappy</h1>
<p>Tryck på skärmen, mellanslag eller FLYG-knappen</p>
</header>

<p>Poäng: <span id="score">0</span> | Highscore: <span id="highscore">0</span></p>

<canvas id="game" width="400" height="500"></canvas><br>

<button id="startBtn">Starta</button>
<button id="flyBtn">FLYG!</button>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreText = document.getElementById("score");
const highscoreText = document.getElementById("highscore");
const startBtn = document.getElementById("startBtn");
const flyBtn = document.getElementById("flyBtn");

let bird, pipes, score, highscore, running, gameOver, frame;

highscore = Number(localStorage.getItem("flappyHighscore")) || 0;
highscoreText.textContent = highscore;

function resetGame(){
    bird = {
        x:80,
        y:250,
        r:16,
        velocity:0
    };

    pipes = [];
    score = 0;
    running = false;
    gameOver = false;
    frame = 0;
    scoreText.textContent = score;
    drawStartScreen();
}

function startGame(){
    if(gameOver){
        resetGame();
    }

    running = true;
    gameOver = false;
}

function fly(){
    if(!running){
        startGame();
    }

    bird.velocity = -7.2;
}

startBtn.onclick = startGame;
flyBtn.onclick = fly;

document.addEventListener("keydown", e => {
    if(e.code === "Space"){
        e.preventDefault();
        fly();
    }
});

canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    fly();
});

function createPipe(){
    const gap = 165;
    const minTop = 50;
    const maxTop = 280;
    const top = Math.floor(Math.random() * (maxTop - minTop)) + minTop;

    pipes.push({
        x:400,
        w:65,
        top:top,
        bottom:top + gap,
        passed:false
    });
}

function drawBackground(){
    ctx.fillStyle = "#7dd3fc";
    ctx.fillRect(0,0,400,500);

    ctx.fillStyle = "#22c55e";
    ctx.fillRect(0,460,400,40);
}

function drawBird(){
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(bird.x+6,bird.y-5,3,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#fb923c";
    ctx.beginPath();
    ctx.moveTo(bird.x+14,bird.y);
    ctx.lineTo(bird.x+28,bird.y-6);
    ctx.lineTo(bird.x+28,bird.y+6);
    ctx.closePath();
    ctx.fill();
}

function drawPipes(){
    ctx.fillStyle = "#16a34a";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x,0,pipe.w,pipe.top);
        ctx.fillRect(pipe.x,pipe.bottom,pipe.w,460-pipe.bottom);
    });
}

function circleRectCollision(circle, rect){
    const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
    const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));

    const dx = circle.x - closestX;
    const dy = circle.y - closestY;

    return (dx * dx + dy * dy) < (circle.r * circle.r);
}

function endGame(){
    running = false;
    gameOver = true;

    if(score > highscore){
        highscore = score;
        localStorage.setItem("flappyHighscore", highscore);
        highscoreText.textContent = highscore;
    }

    setTimeout(() => {
        alert("Game Over! Poäng: " + score);
        resetGame();
    }, 100);
}

function update(){
    if(running){
        frame++;

        bird.velocity += 0.38;
        bird.y += bird.velocity;

        if(frame % 105 === 0){
            createPipe();
        }

        pipes.forEach(pipe => {
            pipe.x -= 2.4;

            if(!pipe.passed && pipe.x + pipe.w < bird.x){
                pipe.passed = true;
                score++;
                scoreText.textContent = score;
            }

            const topRect = {x:pipe.x,y:0,w:pipe.w,h:pipe.top};
            const bottomRect = {x:pipe.x,y:pipe.bottom,w:pipe.w,h:460-pipe.bottom};

            if(circleRectCollision(bird, topRect) || circleRectCollision(bird, bottomRect)){
                endGame();
            }
        });

        pipes = pipes.filter(pipe => pipe.x + pipe.w > 0);

        if(bird.y - bird.r < 0 || bird.y + bird.r > 460){
            endGame();
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw(){
    drawBackground();
    drawPipes();
    drawBird();

    if(!running && !gameOver){
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(40,170,320,110);

        ctx.fillStyle = "white";
        ctx.font = "22px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Tryck Starta eller FLYG",200,215);
        ctx.font = "16px Arial";
        ctx.fillText("Undvik rören och samla poäng",200,245);
    }
}

function drawStartScreen(){
    draw();
}

resetGame();
update();
</script>

</body>
</html>
