<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Memory</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d1117;
    color:white;
    text-align:center;
}

header{
    padding:30px;
    background:linear-gradient(135deg,#0066ff,#00aaff);
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,80px);
    gap:12px;
    justify-content:center;
    margin-top:30px;
}

.card{
    width:80px;
    height:80px;
    background:#161b22;
    border:2px solid #0066ff;
    border-radius:12px;
    font-size:2rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.card.flipped{
    background:#0066ff;
}

a{
    color:#00aaff;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:0;
    border-radius:8px;
    background:#0066ff;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🧠 Blaverus Memory</h1>
<p>Hitta alla par!</p>
</header>

<p>Försök: <span id="moves">0</span></p>
<p>Rekord: <span id="best">-</span></p>

<div class="grid" id="grid"></div>

<button onclick="location.reload()">Starta om</button>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const emojis = ["🐍","🚗","⭐","🎮","🔥","🧠","💎","⚡"];
let cards = [...emojis, ...emojis];
cards.sort(() => Math.random() - 0.5);

const grid = document.getElementById("grid");
const movesText = document.getElementById("moves");
let bestScore = localStorage.getItem("memoryBest");
const bestText = document.getElementById("best");

if(bestScore){
    bestText.textContent = bestScore;
}
let firstCard = null;
let secondCard = null;
let lock = false;
let moves = 0;
let matched = 0;

cards.forEach(symbol => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.symbol = symbol;
    card.textContent = "?";

    card.addEventListener("click", () => {
        if(lock || card.classList.contains("flipped") || card === firstCard) return;

        card.textContent = symbol;
        card.classList.add("flipped");

        if(!firstCard){
            firstCard = card;
        } else {
            secondCard = card;
            moves++;
            movesText.textContent = moves;

            if(firstCard.dataset.symbol === secondCard.dataset.symbol){
                matched += 2;
                firstCard = null;
                secondCard = null;

                if(matched === cards.length){
                    setTimeout(() => {
                       if(!bestScore || moves < bestScore){
    bestScore = moves;
    localStorage.setItem("memoryBest", moves);
    bestText.textContent = moves;
}

alert("Du vann! Försök: " + moves);
                    }, 300);
                }
            } else {
                lock = true;
                setTimeout(() => {
                    firstCard.textContent = "?";
                    secondCard.textContent = "?";
                    firstCard.classList.remove("flipped");
                    secondCard.classList.remove("flipped");
                    firstCard = null;
                    secondCard = null;
                    lock = false;
                }, 800);
            }
        }
    });

    grid.appendChild(card);
});
</script>

</body>
</html>
