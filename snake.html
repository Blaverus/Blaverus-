<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Snake</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

canvas{
    background:#222;
    border:2px solid #0066ff;
    margin-top:20px;
}

a{
    color:#00aaff;
}
</style>
</head>
<body>

<h1>🐍 Blaverus Snake</h1>
<p>Poäng: <span id="score">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<p>Använd piltangenterna för att styra ormen.</p>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;

let snake = [{x: 200, y: 200}];

let food = {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
};

let score = 0;
let direction = "RIGHT";

document.addEventListener("keydown", e => {
    if(e.key==="ArrowUp" && direction!=="DOWN") direction="UP";
    if(e.key==="ArrowDown" && direction!=="UP") direction="DOWN";
    if(e.key==="ArrowLeft" && direction!=="RIGHT") direction="LEFT";
    if(e.key==="ArrowRight" && direction!=="LEFT") direction="RIGHT";
});

function draw(){
    ctx.fillStyle="#222";
    ctx.fillRect(0,0,400,400);

    snake.forEach(part=>{
        ctx.fillStyle="#00ff66";
        ctx.fillRect(part.x,part.y,box,box);
    });

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,box,box);

    let headX=snake[0].x;
    let headY=snake[0].y;

    if(direction==="UP") headY-=box;
    if(direction==="DOWN") headY+=box;
    if(direction==="LEFT") headX-=box;
    if(direction==="RIGHT") headX+=box;

    if(headX===food.x && headY===food.y){
        score++;
        document.getElementById("score").textContent=score;

        food={
            x:Math.floor(Math.random()*20)*box,
            y:Math.floor(Math.random()*20)*box
        };
    } else {
        snake.pop();
    }

    if(headX<0 || headY<0 || headX>=400 || headY>=400){
        alert("Game Over! Poäng: " + score);
        location.reload();
    }

    let newHead={x:headX,y:headY};

    for(let i=0;i<snake.length;i++){
        if(snake[i].x===newHead.x && snake[i].y===newHead.y){
            alert("Game Over! Poäng: " + score);
            location.reload();
        }
    }

    snake.unshift(newHead);
}

setInterval(draw,120);
</script>

</body>
</html>
