<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blaverus Unicorn Kids</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#ffd6f3,#dbeafe);color:#4a044e;text-align:center}
header{padding:24px;background:linear-gradient(135deg,#ff7ad9,#a78bfa,#60a5fa);color:white}
.box{max-width:930px;margin:18px auto;background:white;border-radius:24px;padding:18px;box-shadow:0 10px 25px #0002}
button{padding:15px 22px;margin:8px;border:0;border-radius:999px;background:#ff4fc3;color:white;font-size:1.1rem;cursor:pointer}
canvas{background:#bde9ff;border:5px solid #ff8de3;border-radius:22px;max-width:96%;touch-action:none}
.hidden{display:none}
.cardgrid{display:grid;grid-template-columns:repeat(5,100px);gap:14px;justify-content:center}
.card{width:100px;height:100px;font-size:3rem;background:#ffe4f7;border:4px solid #ff8de3;border-radius:22px}
a{color:#7c3aed;font-weight:bold}
@media(max-width:620px){
    .cardgrid{grid-template-columns:repeat(4,82px)}
    .card{width:82px;height:82px;font-size:2.4rem}
}
</style>
</head>
<body>

<header>
<h1>🦄 Blaverus Unicorn Kids</h1>
<p>Stjärnor, memory, regnbågar och rekord</p>
</header>

<div class="box">
<h2>Välj spel</h2>
<button onclick="showGame('stars')">⭐ Samla stjärnor</button>
<button onclick="showGame('memory')">🌈 Färg-memory</button>
<button onclick="showGame('rainbow')">🎀 Fånga regnbågar</button>
</div>

<div id="stars" class="box game">
<h2>⭐ Samla stjärnor</h2>
<p>Nivå: <span id="starLevel">1</span> | Poäng: <span id="starScore">0</span> | Highscore: <span id="starHigh">0</span></p>
<canvas id="starCanvas" width="720" height="420"></canvas><br>
<button onclick="starLeft()">⬅️ Vänster</button>
<button onclick="starJump()">⬆️ Hoppa</button>
<button onclick="starRight()">➡️ Höger</button>
<button onclick="restartStars()">Starta om</button>
</div>

<div id="memory" class="box game hidden">
<h2>🌈 Färg-memory</h2>
<p>Försök: <span id="moves">0</span> | Bästa rekord: <span id="memoryHigh">-</span></p>
<div class="cardgrid" id="memoryGrid"></div>
<button onclick="startMemory()">Starta om</button>
</div>

<div id="rainbow" class="box game hidden">
<h2>🎀 Fånga regnbågar</h2>
<p>Tid: <span id="rainbowTime">60</span> | Poäng: <span id="rainbowScore">0</span> | Highscore: <span id="rainbowHigh">0</span></p>
<canvas id="rainbowCanvas" width="720" height="420"></canvas><br>
<button onclick="startRainbow()">Starta om</button>
</div>

<p><a href="index.html">← Tillbaka till Blaverus</a></p>

<script>
function showGame(id){
    document.querySelectorAll(".game").forEach(g=>g.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

/* STJÄRNSPEL */
const starCanvas=document.getElementById("starCanvas");
const sctx=starCanvas.getContext("2d");

let unicorn,stars,starScore,starLevel,levelChanging,gameComplete;
let starHigh=Number(localStorage.getItem("unicornStarHigh"))||0;
document.getElementById("starHigh").textContent=starHigh;

const levelThemes=[
    {sky:"#bde9ff",ground:"#86efac",name:"Regnbågsängen",emoji:["🌈","☁️","🌸"]},
    {sky:"#ffd6f3",ground:"#f9a8d4",name:"Rosa drömmen",emoji:["💖","🎀","🌸"]},
    {sky:"#c4b5fd",ground:"#a7f3d0",name:"Magiska skogen",emoji:["🌳","✨","🦋"]},
    {sky:"#fde68a",ground:"#86efac",name:"Solskenslandet",emoji:["☀️","🌼","☁️"]},
    {sky:"#bfdbfe",ground:"#ddd6fe",name:"Kristallhimlen",emoji:["💎","⭐","🌈"]}
];

function restartStars(){
    unicorn={x:70,y:315,w:70,h:60,vx:0,vy:0,onGround:true};
    starScore=0;
    starLevel=1;
    levelChanging=false;
    gameComplete=false;
    createStarLevel();
    updateStarText();
}

function createStarLevel(){
    stars=[];
    levelChanging=false;

    const count=4+starLevel;
    for(let i=0;i<count;i++){
        stars.push({
            x:90+Math.random()*540,
            y:190+Math.random()*110,
            r:24,
            taken:false
        });
    }
}

function updateStarText(){
    document.getElementById("starScore").textContent=starScore;
    document.getElementById("starLevel").textContent=starLevel;
    document.getElementById("starHigh").textContent=starHigh;
}

function nextStarLevel(){
    if(gameComplete)return;

    if(starLevel>=5){
        gameComplete=true;

        if(starScore>starHigh){
            starHigh=starScore;
            localStorage.setItem("unicornStarHigh",starHigh);
        }

        updateStarText();
        alert("Du klarade alla nivåer! 🦄⭐ Poäng: "+starScore);
        restartStars();
        return;
    }

    starLevel++;
    createStarLevel();
    updateStarText();
}

function starLeft(){unicorn.vx=-3.2;setTimeout(()=>unicorn.vx=0,260)}
function starRight(){unicorn.vx=3.2;setTimeout(()=>unicorn.vx=0,260)}
function starJump(){
    if(unicorn.onGround){
        unicorn.vy=-11;
        unicorn.onGround=false;
    }
}

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft")unicorn.vx=-3.2;
    if(e.key==="ArrowRight")unicorn.vx=3.2;
    if(e.code==="Space")starJump();
});
document.addEventListener("keyup",e=>{
    if(e.key==="ArrowLeft"||e.key==="ArrowRight")unicorn.vx=0;
});

function drawStar(ctx,x,y,r){
    ctx.fillStyle="#facc15";
    ctx.beginPath();
    for(let i=0;i<10;i++){
        const a=Math.PI/5*i-Math.PI/2;
        const rr=i%2===0?r:r/2;
        ctx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);
    }
    ctx.closePath();
    ctx.fill();
}

function drawStarBackground(){
    const theme=levelThemes[starLevel-1];

    sctx.fillStyle=theme.sky;
    sctx.fillRect(0,0,720,420);

    sctx.font="44px Arial";
    sctx.fillText(theme.emoji[0],550,90);
    sctx.fillText(theme.emoji[1],130,90);
    sctx.fillText(theme.emoji[2],335,70);

    sctx.fillStyle=theme.ground;
    sctx.fillRect(0,365,720,55);

    sctx.fillStyle="#7c3aed";
    sctx.font="22px Arial";
    sctx.fillText(theme.name,25,35);
}

function starLoop(){
    sctx.clearRect(0,0,720,420);
    drawStarBackground();

    unicorn.vy+=0.42;
    unicorn.x+=unicorn.vx;
    unicorn.y+=unicorn.vy;

    if(unicorn.x<0)unicorn.x=0;
    if(unicorn.x+unicorn.w>720)unicorn.x=720-unicorn.w;

    if(unicorn.y>315){
        unicorn.y=315;
        unicorn.vy=0;
        unicorn.onGround=true;
    }

    stars.forEach(st=>{
        if(st.taken)return;

        drawStar(sctx,st.x,st.y,st.r);

        const ux=unicorn.x+35;
        const uy=unicorn.y+35;
        const dx=ux-st.x;
        const dy=uy-st.y;

        if(Math.sqrt(dx*dx+dy*dy)<65){
            st.taken=true;
            starScore++;

            if(starScore>starHigh){
                starHigh=starScore;
                localStorage.setItem("unicornStarHigh",starHigh);
            }

            updateStarText();
        }
    });

    sctx.font="62px Arial";
    sctx.fillText("🦄",unicorn.x,unicorn.y+55);

    if(stars.length>0 && stars.every(s=>s.taken) && !levelChanging){
        levelChanging=true;

        sctx.fillStyle="#7c3aed";
        sctx.font="34px Arial";
        sctx.fillText("Nivå klar! 🌟",265,200);

        setTimeout(nextStarLevel,900);
    }

    requestAnimationFrame(starLoop);
}

/* MEMORY */
const emojis=["🦄","🌈","⭐","💖","🎀","🍭","☁️","🌸","🧁","💎"];
let memoryCards,first,second,locked,moves,found;
let memoryHigh=localStorage.getItem("unicornMemoryHigh");
document.getElementById("memoryHigh").textContent=memoryHigh||"-";

function startMemory(){
    memoryCards=[...emojis,...emojis].sort(()=>Math.random()-0.5);
    first=null;second=null;locked=false;moves=0;found=0;
    document.getElementById("moves").textContent=moves;

    const grid=document.getElementById("memoryGrid");
    grid.innerHTML="";

    memoryCards.forEach(symbol=>{
        const btn=document.createElement("button");
        btn.className="card";
        btn.textContent="❔";
        btn.dataset.symbol=symbol;

        btn.onclick=()=>{
            if(locked||btn.textContent!=="❔")return;
            btn.textContent=symbol;

            if(!first){
                first=btn;
            }else{
                second=btn;
                moves++;
                document.getElementById("moves").textContent=moves;

                if(first.dataset.symbol===second.dataset.symbol){
                    found+=2;
                    first=null;second=null;

                    if(found===memoryCards.length){
                        if(!memoryHigh||moves<Number(memoryHigh)){
                            memoryHigh=moves;
                            localStorage.setItem("unicornMemoryHigh",memoryHigh);
                            document.getElementById("memoryHigh").textContent=memoryHigh;
                        }
                        setTimeout(()=>alert("Du vann! 🌈 Försök: "+moves),300);
                    }
                }else{
                    locked=true;
                    setTimeout(()=>{
                        first.textContent="❔";
                        second.textContent="❔";
                        first=null;second=null;locked=false;
                    },1000);
                }
            }
        };

        grid.appendChild(btn);
    });
}

/* REGNBÅGAR */
const rainbowCanvas=document.getElementById("rainbowCanvas");
const rctx=rainbowCanvas.getContext("2d");

let rainbows=[],rainbowScore=0,rainbowTimer=0,rainbowTime=60,rainbowRunning=true;
let rainbowHigh=Number(localStorage.getItem("unicornRainbowHigh"))||0;
document.getElementById("rainbowHigh").textContent=rainbowHigh;

function startRainbow(){
    rainbows=[];
    rainbowScore=0;
    rainbowTimer=0;
    rainbowTime=60;
    rainbowRunning=true;
    document.getElementById("rainbowScore").textContent=rainbowScore;
    document.getElementById("rainbowTime").textContent=rainbowTime;
}

rainbowCanvas.addEventListener("click",e=>{
    if(!rainbowRunning)return;

    const rect=rainbowCanvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)*rainbowCanvas.width/rect.width;
    const y=(e.clientY-rect.top)*rainbowCanvas.height/rect.height;

    rainbows.forEach(rb=>{
        const dx=x-rb.x;
        const dy=y-rb.y;

        if(!rb.hit&&Math.sqrt(dx*dx+dy*dy)<80){
            rb.hit=true;
            rainbowScore++;
            document.getElementById("rainbowScore").textContent=rainbowScore;

            if(rainbowScore>rainbowHigh){
                rainbowHigh=rainbowScore;
                localStorage.setItem("unicornRainbowHigh",rainbowHigh);
                document.getElementById("rainbowHigh").textContent=rainbowHigh;
            }
        }
    });
});

function drawRainbow(ctx,x,y){
    ctx.lineWidth=12;
    const colors=["#ef4444","#f97316","#facc15","#22c55e","#3b82f6","#a855f7"];

    colors.forEach((c,i)=>{
        ctx.strokeStyle=c;
        ctx.beginPath();
        ctx.arc(x,y,65-i*8,Math.PI,0);
        ctx.stroke();
    });
}

function rainbowLoop(){
    rctx.clearRect(0,0,720,420);
    rctx.fillStyle="#bde9ff";
    rctx.fillRect(0,0,720,420);

    rctx.font="46px Arial";
    rctx.fillText("🦄",65,350);
    rctx.fillText("☁️",520,95);
    rctx.fillText("☁️",250,75);

    if(rainbowRunning){
        rainbowTimer++;

        if(rainbowTimer%60===0){
            rainbowTime--;
            document.getElementById("rainbowTime").textContent=rainbowTime;

            if(rainbowTime<=0){
                rainbowRunning=false;
                alert("Tiden är slut! Poäng: "+rainbowScore);
            }
        }

        if(rainbowTimer%95===0){
            rainbows.push({
                x:120+Math.random()*480,
                y:150+Math.random()*150,
                life:360,
                hit:false
            });
        }

        rainbows.forEach(rb=>rb.life--);
        rainbows=rainbows.filter(rb=>rb.life>0&&!rb.hit);
    }

    rainbows.forEach(rb=>{
        if(!rb.hit)drawRainbow(rctx,rb.x,rb.y);
    });

    if(!rainbowRunning){
        rctx.fillStyle="#7c3aed";
        rctx.font="34px Arial";
        rctx.fillText("Tiden är slut! 🎀",245,210);
    }

    requestAnimationFrame(rainbowLoop);
}

restartStars();
startMemory();
startRainbow();
starLoop();
rainbowLoop();
</script>

</body>
</html>
